services:
  backend:
    build: ./backend
    container_name: hireiq-backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: sqlite:////app/data/hireiq.db
    volumes:
      - hireiq_data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status == 200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: http://backend:8000
    container_name: hireiq-frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  hireiq_data:
